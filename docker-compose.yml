services:
  fellsidedigital:
    image: ${DOCKER_REGISTRY-}fellsidedigital
    build:
      context: .
      dockerfile: FellsideDigital/Dockerfile
    environment:
      # Application Settings
      - ConnectionStrings__DefaultConnection=Host=auction_portal_postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - auction_portal_postgres

  auction_portal_postgres:
    image: postgres:15
    container_name: auction_portal_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
