services:
  fellsidedigital:
    container_name: fellside_digital
    image: ${DOCKER_REGISTRY-}fellsidedigital
    build:
      context: ./src
      dockerfile: FellsideDigital.Web/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Development
      - Email__Username=${EMAIL__USERNAME}
      - Email__Password=${EMAIL__PASSWORD}
      - Email__FromAddress=${EMAIL__FROMADDRESS}
      - Email__TenantId=${TENANT_ID}
      - Email__ClientId=${CLIENT_ID}
      - Email__ClientSecret=${CLIENT_SECRET}
      - Storage__ServiceUrl=http://minio:9000
      - Storage__PublicUrl=http://localhost:9000
      - Storage__AccessKey=minioadmin
      - Storage__SecretKey=minioadmin
      - Storage__BucketName=invoices
      - Storage__Region=us-east-1
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keys_volume:/app/keys

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API  — http://localhost:9000
      - "9001:9001"   # Web UI  — http://localhost:9001  (login: minioadmin / minioadmin)
    volumes:
      - minio_data:/data

  # minio-init:
  #   image: minio/mc:latest
  #   container_name: minio-init
  #   restart: on-failure
  #   depends_on:
  #     - minio
  #   entrypoint: >
  #     /bin/sh -c "
  #       mc alias set local http://minio:9000 minioadmin minioadmin &&
  #       mc mb --ignore-existing local/invoices &&
  #       echo 'MinIO bucket ready.'
  #     "

volumes:
  pgdata:
  keys_volume:
  minio_data:
